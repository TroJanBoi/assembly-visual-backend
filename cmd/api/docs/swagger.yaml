definitions:
  types.AllowedInstructions:
    properties:
      arithmetic:
        additionalProperties:
          type: integer
        description: ADD, SUB, INC, DEC, MUL, DIV
        type: object
      comparison_and_conditional:
        additionalProperties:
          type: integer
        description: CMP, JMP, JC, JNZ, JZ, JNC
        type: object
      data_movement:
        additionalProperties:
          type: integer
        description: LOAD, STORE, MOV
        type: object
      system:
        additionalProperties:
          type: integer
        description: LABEL, NOP, HLT
        type: object
