definitions:
  types.AssignmentCondition:
    properties:
      arithmetic:
        additionalProperties:
          type: integer
        description: ADD, SUB, INC, DEC, MUL, DIV
        type: object
      comparison_and_conditional:
        additionalProperties:
          type: integer
        description: CMP, JMP, JC, JNZ, JZ, JNC
        type: object
      data_movement:
        additionalProperties:
          type: integer
        description: LOAD, STORE, MOV
        type: object
      system:
        additionalProperties:
          type: integer
        description: LABEL, NOP, HLT
        type: object
    type: object
  types.AssignmentResponse:
    properties:
      class_id:
        type: integer
      condition:
        $ref: '#/definitions/types.AssignmentCondition'
      description:
        type: string
      due_date:
        type: string
      grade:
        description: total grade of the assignment
        type: integer
      id:
        type: integer
      max_attempt:
        type: integer
      settings:
        $ref: '#/definitions/types.AssignmentSettings'
      title:
        type: string
    type: object
  types.AssignmentSettings:
    properties:
      fe_behavior:
        $ref: '#/definitions/types.FEBehavior'
      grade_policy:
        $ref: '#/definitions/types.GradePolicy'
      test_case_policy:
        $ref: '#/definitions/types.TestCasePolicy'
    type: object
  types.CatResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  types.ChangePasswordRequest:
    properties:
      new_password:
        type: string
    required:
    - new_password
    type: object
  types.ClassResponse:
    properties:
      description:
        type: string
      fav_score:
        type: integer
      google_course_id:
        type: string
      google_course_link:
        type: string
      google_synced_at:
        type: string
      id:
        type: integer
      owner:
        type: integer
      status:
        type: integer
      topic:
        type: string
    type: object
  types.CreateAssignmentRequest:
    properties:
      description:
        type: string
      grade:
        description: total grade of the assignment
        type: integer
      max_attempt:
        type: integer
      title:
        type: string
    required:
    - description
    - title
    type: object
  types.CreateClassRequest:
    properties:
      description:
        type: string
      google_course_id:
        type: string
      google_course_link:
        type: string
      status:
        description: public or private
        type: integer
      topic:
        type: string
    required:
    - description
    - topic
    type: object
  types.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      tel:
        type: string
    required:
    - email
    type: object
  types.EditAssignmentRequest:
    properties:
      description:
        type: string
      grade:
        description: total grade of the assignment
        type: integer
      max_attempt:
        type: integer
      title:
        type: string
    type: object
  types.EditProfileRequest:
    properties:
      name:
        type: string
      picture_path:
        type: string
      tel:
        type: string
      username:
        type: string
    type: object
  types.FEBehavior:
    properties:
      allow_resubmit_after_due:
        type: boolean
      lock_after_submit:
        type: boolean
    type: object
  types.GradePolicy:
    properties:
      mode:
        type: string
      weight:
        $ref: '#/definitions/types.WeightPolicy'
    type: object
  types.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  types.OperationResponse:
    properties:
      message:
        type: string
      status_code:
        type: integer
      value:
        type: number
    type: object
  types.SignInRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      tel:
        type: string
    required:
    - email
    - password
    type: object
  types.TestCasePolicy:
    properties:
      visible_to_student:
        type: boolean
    type: object
  types.UpdateClassRequest:
    properties:
      description:
        type: string
      google_course_id:
        type: string
      google_course_link:
        type: string
      status:
        description: public or private
        type: integer
      topic:
        type: string
    type: object
  types.UpdateUserRequest:
    properties:
      name:
        type: string
      password:
        type: string
      tel:
        type: string
    type: object
  types.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      password:
        type: string
      tel:
        type: string
    type: object
  types.WeightPolicy:
    properties:
      number_of_node_used:
        type: number
      test_case:
        type: number
    type: object
