      condition:
        $ref: '#/definitions/types.AssignmentCondition'
      description:
        type: string
      due_date:
        type: string
      grade:
        description: total grade of the assignment
        type: integer
      id:
        type: integer
      max_attempt:
        type: integer
      settings:
        $ref: '#/definitions/types.AssignmentSettings'
      title:
        type: string
    type: object
  types.AssignmentSettings:
    properties:
