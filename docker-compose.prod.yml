# Deployment configuration for Production / Full stack local testing
# Run this file with: docker-compose -f docker-compose.prod.yml up --build -d

services:
  # 1. Database
  postgres:
    image: postgres:15
    container_name: assembly_prod_postgres
    restart: always
    env_file: .env.prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d  
    networks:
      - assembly-prod-net

  # 2. Backend API
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: assembly_prod_backend
    restart: always
    env_file: .env.prod
    environment:
      - ENV=production
      - POSTGRES_HOST=postgres
    ports:
      - "9090:9090"
    networks:
      - assembly-prod-net
    depends_on:
      - postgres

  # 3. Frontend Web App
  frontend:
    build: 
      context: ../assembly-visual-frontend/app
      dockerfile: Dockerfile
    container_name: assembly_prod_frontend
    restart: always
    env_file: ../assembly-visual-frontend/app/.env.local 
    environment:
      - NEXT_PUBLIC_API_URL=/api 
      - INTERNAL_API_URL=http://backend:9090
    networks:
      - assembly-prod-net
    depends_on:
      - backend

  # 4. NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: assembly_prod_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - assembly-prod-net
    depends_on:
      - frontend
      - backend

volumes:
  pgdata_prod:

networks:
  assembly-prod-net:
    driver: bridge
